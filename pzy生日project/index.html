function Confetti() {

    color:['#FF6B35','#FF3EA5','#FFD700','#7B2FBE','#00E676','#FF4444'][i%6],

  }));
  return (
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,overflow:'hidden'}}>
      {items.map(p=>(
        <div key={p.id} style={{
          position:'absolute',top:'-20px',left:`${p.x}%`,
          width:p.size,height:p.size,background:p.color,
          borderRadius:p.id%3?'50%':'2px',
          animation:`confetti ${2+Math.random()*2}s ${p.delay}s ease-in forwards`,
        }}/>
      ))}
    </div>
  );

function ProgressBar({label,delay,onDone}) {
  const [pct,setPct]=useState(0);
  const done=pct>=100;
  useEffect(()=>{
    const t=setTimeout(()=>{
      const iv=setInterval(()=>{
        setPct(p=>{ if(p>=100){clearInterval(iv);if(onDone)onDone();return 100;} return Math.min(100,p+Math.random()*18+4); });
      },70);
      return ()=>clearInterval(iv);
    },delay);
    return ()=>clearTimeout(t);
  },[]);
  return (
    <div style={{marginBottom:14,opacity:pct>0?1:.3,transition:'opacity .3s'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#666',marginBottom:5,fontFamily:'monospace'}}>
        <span>{label}</span>
        <span style={{color:done?'#27AE60':'#1A237E'}}>{done?'✓ 完成':`${Math.min(100,Math.round(pct))}%`}</span>
      </div>
      <div style={{height:6,background:'#e8e8e8',borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${Math.min(100,pct)}%`,background:done?'#27AE60':'linear-gradient(90deg,#1A237E,#C0392B)',borderRadius:3,transition:'width .08s'}}/>
      </div>
    </div>
  );
}

function WrappedSection() {
  const PEOPLE_SLIDE = 13; // index of people slide
  const TOTAL = 17;

  const [idx,setIdx]=useState(()=>{ try{return parseInt(localStorage.getItem('w_idx'))||0;}catch{return 0;} });
  const [revealed,setRevealed]=useState(0);
  const [anim,setAnim]=useState(true);
  const touchStart=useRef(null);

  useEffect(()=>{ try{localStorage.setItem('w_idx',idx);}catch{} },[idx]);

  const gotoSlide=useCallback((target)=>{
    if(target<0||target>=TOTAL)return;
    setAnim(false);
    setTimeout(()=>{ setIdx(target); setRevealed(0); setAnim(true); },240);
  },[]);

  const next=useCallback(()=>{
    if(idx===PEOPLE_SLIDE&&revealed<10){ setRevealed(r=>r+1); return; }
    gotoSlide(idx+1);
  },[idx,revealed,gotoSlide]);

  const prev=useCallback(()=>{
    gotoSlide(idx-1);
  },[idx,gotoSlide]);

  const handleTouchStart=e=>{ touchStart.current=e.touches[0].clientX; };
  const handleTouchEnd=e=>{
    if(touchStart.current===null)return;
    const diff=touchStart.current-e.changedTouches[0].clientX;
    if(Math.abs(diff)>50){ diff>0?next():prev(); }
    touchStart.current=null;
  };

  // Tap on slide body = next (excluding nav buttons)
  const handleTap=e=>{
    if(e.target.closest('.nav-btn'))return;
    next();
  };

  const slides=[
    <SlideIntro/>,                                             // 0
    <SlideStats/>,                                             // 1
    <SlideEventTitle/>,                                        // 2
    <SlideEvent ev={EVENTS[0]} num={1} total={5}/>,            // 3
    <SlidePhotoPair photos={['photo_together1.jpg','photo_together2.jpg']} date="2023.08.01" caption="从这天起，系统正式记录在册\n研究生工位 · 在一起第一天"/>, // 4
    <SlideEvent ev={EVENTS[1]} num={2} total={5}/>,            // 5
    <SlidePhotoPair photos={['photo_qh4.jpg','photo_qh1.jpg']} date="2023.08.31 · 兰州" caption="落地第一天 · 机场高铁 + 按摩放松"/>, // 6
    <SlidePhotoPair photos={['photo_qh2.jpg','photo_qh3.jpg']} date="2023.09 · 青海" caption="草原蓝天 · 茶卡盐湖日落\n幸福指数超出量程"/>, // 7
    <SlideRoast/>,                                             // 8
    <SlidePhoto src="photo_bday2025.jpg" sub="2025.04.19" caption={"去年今天"}/>, // 9
    <SlideEvent ev={EVENTS[2]} num={3} total={5}/>,            // 10
    <SlideGraduation/>,                                        // 11
    <SlideEvent ev={EVENTS[3]} num={4} total={5}/>,            // 12
    <SlidePeople revealed={revealed}/>,                        // 13
    <SlideEvent ev={EVENTS[4]} num={5} total={5}/>,            // 14
    <SlideDistance/>,                                          // 15
    <SlideRedPacket/>,                                         // 16
  ];

  return (
    <div
      className="wrapped-page"
      style={{background:BG_DARKS[idx]||BG_DARKS[0]}}
      onClick={handleTap}
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
    >
      {/* Progress dots */}
      <div style={{position:'absolute',top:18,left:0,right:0,display:'flex',justifyContent:'center',gap:4,zIndex:10,padding:'0 60px'}}>
        {Array.from({length:TOTAL}).map((_,i)=>(
          <div key={i} style={{flex:i===idx?2:1,height:3,borderRadius:2,background:i<=idx?'rgba(255,255,255,.8)':'rgba(255,255,255,.2)',transition:'all .3s ease'}}/>
        ))}
      </div>

      {/* Slide content */}
      <div style={{
        width:'100%',maxWidth:480,flex:1,
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        paddingTop:44,paddingBottom:80,
        opacity:anim?1:0,transform:anim?'translateY(0)':'translateY(12px)',
        transition:'opacity .24s ease, transform .24s ease',
      }}>
        {slides[idx]}
      </div>

      {/* Nav buttons */}
      {idx>0&&(
        <button className="nav-btn left" onClick={e=>{e.stopPropagation();prev();}}>←</button>
      )}
      {idx<TOTAL-1&&(
        <button className="nav-btn right" onClick={e=>{e.stopPropagation();next();}}>→</button>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────

function App() {
  const [phase,setPhase]=useState(()=>{ try{return localStorage.getItem('phase')||'login';}catch{return 'login';} });
  const go=p=>{ try{localStorage.setItem('phase',p);}catch{} setPhase(p); };
  if(phase==='login')   return <LoginPage   onLogin={()=>go('verify')}/>;
  if(phase==='verify')  return <VerifyPage  onNext={()=>go('lottery')}/>;
  if(phase==='lottery') return <LotteryPage onWin={()=>go('wrapped')}/>;
  return <WrappedSection/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
